    <path class="ico" d="M24 18c-4 0-4 4-4 6v2c0 2-2 4-4 4 2 0 4 2 4 4v2c0 2 0 6 4 6"
      stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Right brace -->
    <path class="ico" d="M40 18c4 0 4 4 4 6v2c0 2 2 4 4 4-2 0-4 2-4 4v2c0 2 0 6-4 6"
      stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Conversion arrows -->
    <g transform="rotate(-18 32 30)">
      <path class="ico" d="M26 30h12" stroke-width="3.5" stroke-linecap="round"/>
      <path class="ico" d="M32 24l6 6-6 6" stroke-width="3.5" fill="none"/>

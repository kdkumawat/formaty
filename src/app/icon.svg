<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg  { fill: #ffffff; }
    .ico { stroke: oklch(45% 0.24 277.023); }
    @media (prefers-color-scheme: dark) {
      .bg  { fill: #111111; }
      .ico { stroke: oklch(65% 0.22 277.023); }
    }
  </style>

  <rect class="bg" width="64" height="64" rx="14"/>

  <g transform="translate(32 36) scale(1.9) translate(-32 -32)">
